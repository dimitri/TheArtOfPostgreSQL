services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taop
      POSTGRES_USER: taop
      POSTGRES_PASSWORD: taop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taop -d taop"]
      interval: 5s
      timeout: 5s
      retries: 5

  taop-build:
    build:
      context: .
      dockerfile: docker/taop-build.Dockerfile
    image: taop-build

  taop:
    build:
      context: .
      dockerfile: docker/taop.Dockerfile
      args:
        BUILD_IMAGE: taop-build
    environment:
      PGPASSWORD: taop
      PGUSER: taop
      PGDATABASE: taop
      PGHOST: postgres
      PGPORT: 5432
      SCAN34_DIR: /data/scan34
      MAGIC_DIR: /data/magic
      RATES_DIR: /data/rates
      SHAKESPEARE_DIR: /data/shakespeare
      SHAKESPEARE_PLAY_XML: /data/shakespeare/shakes/dream.xml
      F1DB_DIR: /data/f1db
      MOMA_DIR: /data/MoMA
      OPENDATA_DIR: /data/opendata
      EAV_DIR: /data/eav
    volumes:
      - ./queries:/usr/src/taop/queries:ro
      - ./apps/cdstore:/usr/src/taop/cdstore:ro
      - ./tooling:/usr/src/taop/tooling:ro
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /usr/src/taop/queries
    init: true

  commitlog:
    build:
      context: .
      dockerfile: docker/commitlog.Dockerfile
      args:
        BUILD_IMAGE: taop-build
    environment:
      PGPASSWORD: taop
      PGUSER: taop
      PGDATABASE: taop
      PGHOST: postgres
      PGPORT: 5432
      COMMITLOG_DIR: /data/commitlog
    volumes:
      - ./queries:/usr/src/taop/queries:ro
      - ./apps/cdstore:/usr/src/taop/cdstore:ro
      - ./tooling:/usr/src/taop/tooling:ro
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /usr/src/taop/queries
    init: true

  psql:
    build:
      context: .
      dockerfile: docker/psql.Dockerfile
    environment:
      PGPASSWORD: taop
      PGUSER: taop
      PGDATABASE: taop
      PGHOST: postgres
      PGPORT: 5432
    volumes:
      - ./queries:/usr/src/taop/queries:ro
      - ./apps/cdstore:/usr/src/taop/cdstore:ro
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: true
    command: ["psql"]

volumes:
  postgres_data:
